<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d4d7"/>
      <stop offset="50%" stop-color="#d5c8e6"/>
      <stop offset="100%" stop-color="#c4d7eb"/>
    </linearGradient>

    <!-- Page shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#3d3633" flood-opacity="0.1"/>
    </filter>

    <!-- Subtle paper texture -->
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in="SourceGraphic" in2="blend" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Notebook lines -->
  <g opacity="0.1" stroke="#7a706a" stroke-width="1.5">
    <line x1="130" y1="180" x2="382" y2="180"/>
    <line x1="130" y1="230" x2="382" y2="230"/>
    <line x1="130" y1="280" x2="382" y2="280"/>
    <line x1="130" y1="330" x2="382" y2="330"/>
    <line x1="130" y1="380" x2="382" y2="380"/>
  </g>

  <!-- Margin line -->
  <line x1="155" y1="140" x2="155" y2="410" stroke="#e8a8ad" stroke-width="2" opacity="0.3"/>

  <!-- Page curl / fold -->
  <path d="M382 140 L382 170 Q382 180 372 180 L352 180 L382 140Z" fill="#ffffff" opacity="0.4"/>

  <!-- Main letter N - handwritten style -->
  <g filter="url(#shadow)">
    <!-- N stroke 1 (left) -->
    <path d="M185 395 Q183 380 184 350 Q185 300 186 260 Q187 220 188 180 Q189 160 190 150"
          stroke="#3d3633" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- N stroke 2 (diagonal) -->
    <path d="M190 155 Q210 200 260 280 Q300 340 320 370 Q330 385 335 395"
          stroke="#3d3633" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- N stroke 3 (right) -->
    <path d="M322 395 Q321 380 322 350 Q323 300 324 260 Q325 220 326 180 Q327 160 328 150"
          stroke="#3d3633" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Small decorative star -->
  <g transform="translate(395, 130)" opacity="0.5">
    <path d="M0,-12 L3,-4 L12,-4 L5,2 L7,10 L0,5 L-7,10 L-5,2 L-12,-4 L-3,-4 Z"
          fill="#f5e6a3" stroke="#e8b89a" stroke-width="1"/>
  </g>

  <!-- Small heart -->
  <g transform="translate(115, 420)" opacity="0.35">
    <path d="M0,6 C0,6 -8,-2 -8,-6 C-8,-9 -5,-11 -3,-9 C-1,-7 0,-5 0,-5 C0,-5 1,-7 3,-9 C5,-11 8,-9 8,-6 C8,-2 0,6 0,6Z"
          fill="#e8a8ad"/>
  </g>

  <!-- Sparkle dots -->
  <circle cx="400" cy="400" r="4" fill="#b5a0d4" opacity="0.4"/>
  <circle cx="105" cy="150" r="3" fill="#9fc19a" opacity="0.35"/>
  <circle cx="420" cy="260" r="3.5" fill="#8fb3d9" opacity="0.3"/>
</svg>
