<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="50%" stop-color="#f0ebe3"/>
      <stop offset="100%" stop-color="#faf7f2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2d4d7"/>
      <stop offset="50%" stop-color="#d5c8e6"/>
      <stop offset="100%" stop-color="#c4d7eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Notebook lines -->
  <g opacity="0.08" stroke="#7a706a" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="130" x2="1200" y2="130"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="230" x2="1200" y2="230"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="330" x2="1200" y2="330"/>
    <line x1="0" y1="380" x2="1200" y2="380"/>
    <line x1="0" y1="430" x2="1200" y2="430"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="530" x2="1200" y2="530"/>
    <line x1="0" y1="580" x2="1200" y2="580"/>
  </g>

  <!-- Margin line -->
  <line x1="120" y1="0" x2="120" y2="630" stroke="#e8a8ad" stroke-width="1.5" opacity="0.2"/>

  <!-- Left side: Icon -->
  <g transform="translate(180, 170)">
    <rect width="280" height="280" rx="56" ry="56" fill="url(#accent)"/>
    <!-- Notebook lines on icon -->
    <g opacity="0.1" stroke="#7a706a" stroke-width="1">
      <line x1="60" y1="100" x2="220" y2="100"/>
      <line x1="60" y1="140" x2="220" y2="140"/>
      <line x1="60" y1="180" x2="220" y2="180"/>
      <line x1="60" y1="220" x2="220" y2="220"/>
    </g>
    <!-- N letter -->
    <g stroke="#3d3633" stroke-width="24" stroke-linecap="round" fill="none">
      <path d="M95 230 Q94 200 95 170 Q96 130 97 100 Q98 85 99 78"/>
      <path d="M99 80 Q115 115 145 160 Q165 190 175 210 Q180 220 182 230"/>
      <path d="M178 230 Q177 200 178 170 Q179 130 180 100 Q181 85 182 78"/>
    </g>
  </g>

  <!-- Right side: Text -->
  <text x="540" y="250" font-family="Georgia, serif" font-size="72" font-weight="bold" fill="#3d3633">
    Noto
  </text>
  <text x="540" y="310" font-family="Georgia, serif" font-size="28" fill="#7a706a">
    your second brain
  </text>

  <!-- Decorative elements -->
  <g transform="translate(540, 370)">
    <text font-family="Georgia, serif" font-size="18" fill="#a89e96">
      note-taking app with Cortex AI  &#x2022;  100% free  &#x2022;  open source
    </text>
  </g>

  <!-- Coming soon pill -->
  <g transform="translate(540, 410)">
    <rect x="-80" y="-16" width="160" height="32" rx="16" ry="16"
          fill="none" stroke="#b5a0d4" stroke-width="2" stroke-dasharray="6,4"/>
    <text text-anchor="middle" y="5" font-family="Georgia, serif" font-size="16" fill="#b5a0d4">
      coming soon
    </text>
  </g>

  <!-- Sparkle decorations -->
  <circle cx="950" cy="150" r="5" fill="#f5e6a3" opacity="0.4"/>
  <circle cx="1000" cy="200" r="3" fill="#d5c8e6" opacity="0.35"/>
  <circle cx="1050" cy="120" r="4" fill="#c8dbc5" opacity="0.3"/>
  <circle cx="900" cy="480" r="4" fill="#f2d4d7" opacity="0.35"/>
  <circle cx="1020" cy="450" r="3" fill="#c4d7eb" opacity="0.3"/>
  <circle cx="1100" cy="500" r="5" fill="#d5c8e6" opacity="0.25"/>
</svg>
